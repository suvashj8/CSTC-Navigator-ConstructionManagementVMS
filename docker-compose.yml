# Full Docker stack — host ports use the 7000 series (LAN-accessible in dev)
#   UI:       http://localhost:7000  (or http://YOUR_LAN_IP:7000)
#   API:      http://localhost:7001  (or http://YOUR_LAN_IP:7001)
#   Postgres: localhost:7002  (container :5432)
#   Redis:    localhost:7003  (container :6379)
# Usage: docker compose up --build -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      POSTGRES_DB: ${POSTGRES_DB:-vms_main}
    ports:
      - "7002:5432"
    volumes:
      - vms_pg:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vms} -d ${POSTGRES_DB:-vms_main}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "7003:6379"
    volumes:
      - vms_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "7001:3000"
    environment:
      NODE_ENV: production
      MAIN_DB_HOST: postgres
      MAIN_DB_PORT: 5432
      MAIN_DB_USER: ${POSTGRES_USER:-vms}
      MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      MAIN_DB_NAME: ${POSTGRES_DB:-vms_main}
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      SEED_ON_STARTUP: "${SEED_ON_STARTUP:-true}"
      EXPORT_DIR: /app/exports
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7000,http://127.0.0.1:7000}
      VMS_ALLOW_LAN_CORS: "${VMS_ALLOW_LAN_CORS:-true}"
      VMS_REDIS_REQUIRED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - vms_exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    command: ["node", "scripts/worker.mjs"]
    environment:
      NODE_ENV: production
      MAIN_DB_HOST: postgres
      MAIN_DB_PORT: 5432
      MAIN_DB_USER: ${POSTGRES_USER:-vms}
      MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD:-vms}
      MAIN_DB_NAME: ${POSTGRES_DB:-vms_main}
      REDIS_ADDR: redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    ports:
      - "7000:80"
      - "7443:443"
    environment:
      API_PORT: 3000
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  vms_pg:
  vms_redis:
  vms_exports:

networks:
  default:
    name: vms-network
