# Docker stack — API/worker/UI in containers; Postgres runs on the host.
#   UI:    http://localhost:7000
#   API:   http://localhost:7001
#   Redis: localhost:7003  (container :6379)
#   DB:    host PostgreSQL (default localhost:5432 — containers use host.docker.internal)
# Usage: docker compose up --build -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:7003:6379"
    volumes:
      - vms_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "7001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      MAIN_DB_HOST: host.docker.internal
      MAIN_DB_PORT: ${MAIN_DB_PORT:-5432}
      MAIN_DB_USER: ${MAIN_DB_USER:-vms}
      MAIN_DB_PASSWORD: ${MAIN_DB_PASSWORD:-vms}
      MAIN_DB_NAME: ${MAIN_DB_NAME:-vms_main}
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      SEED_ON_STARTUP: "${SEED_ON_STARTUP:-true}"
      EXPORT_DIR: /app/exports
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7000}
      VMS_ALLOW_LAN_CORS: "false"
      VMS_REDIS_REQUIRED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - vms_exports:/app/exports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    command: ["node", "scripts/worker.mjs"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      MAIN_DB_HOST: host.docker.internal
      MAIN_DB_PORT: ${MAIN_DB_PORT:-5432}
      MAIN_DB_USER: ${MAIN_DB_USER:-vms}
      MAIN_DB_PASSWORD: ${MAIN_DB_PASSWORD:-vms}
      MAIN_DB_NAME: ${MAIN_DB_NAME:-vms_main}
      REDIS_ADDR: redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    ports:
      - "7000:80"
      - "7443:443"
    environment:
      API_PORT: 3000
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  vms_redis:
  vms_exports:

networks:
  default:
    name: vms-network
