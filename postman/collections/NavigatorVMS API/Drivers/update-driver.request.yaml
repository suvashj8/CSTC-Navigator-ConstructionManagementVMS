$kind: http-request
name: Update Driver
method: PUT
url: '{{baseUrl}}/api/v1/drivers/{{driverId}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Driver Updated"
    }
