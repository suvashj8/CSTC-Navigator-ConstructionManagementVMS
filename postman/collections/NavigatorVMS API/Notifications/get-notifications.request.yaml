$kind: http-request
name: Get Notifications
method: GET
url: '{{baseUrl}}/api/v1/notifications'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const d = pm.response.json(); if(d.data?.length) pm.environment.set("notificationId", d.data[0].id);
