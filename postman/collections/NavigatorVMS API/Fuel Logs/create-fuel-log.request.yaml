$kind: http-request
name: Create Fuel Log
method: POST
url: '{{baseUrl}}/api/v1/fuel-logs'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "asset_id": "{{assetId}}",
      "date": "2025-01-15",
      "litres": 50,
      "cost": 8500,
      "odometer": 12000
    }
