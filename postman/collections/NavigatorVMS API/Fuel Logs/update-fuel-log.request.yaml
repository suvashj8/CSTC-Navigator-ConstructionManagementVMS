$kind: http-request
name: Update Fuel Log
method: PUT
url: '{{baseUrl}}/api/v1/fuel-logs/{{fuelLogId}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "litres": 55
    }
