$kind: http-request
name: Create Maintenance
method: POST
url: '{{baseUrl}}/api/v1/maintenance'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "asset_id": "{{assetId}}",
      "description": "Test maintenance",
      "date": "2025-01-20",
      "cost": 5000
    }
