$kind: http-request
name: Create Location
method: POST
url: '{{baseUrl}}/api/v1/locations'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Location",
      "location_type_id": null
    }
