$kind: http-request
name: Create Ownership Type
method: POST
url: '{{baseUrl}}/api/v1/ownership-types'
order: 10000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Ownership Type"
    }
