$kind: http-request
name: Create Vehicle Make
method: POST
url: '{{baseUrl}}/api/v1/vehicle-makes'
order: 2100
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Hino",
      "description": "Custom fleet manufacturer"
    }
