$kind: http-request
name: Create Supplier Category
method: POST
url: '{{baseUrl}}/api/v1/supplier-categories'
order: 14000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Supplier Category"
    }
