$kind: http-request
name: Create Location Type
method: POST
url: '{{baseUrl}}/api/v1/location-types'
order: 16000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{tenantToken}}'
headers:
  - key: X-Tenant-Subdomain
    value: '{{tenantSubdomain}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Location Type"
    }
