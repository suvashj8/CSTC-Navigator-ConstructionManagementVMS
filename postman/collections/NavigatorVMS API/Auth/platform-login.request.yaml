$kind: http-request
name: Platform Login
method: POST
url: '{{baseUrl}}/api/v1/platform/auth/login'
order: 2000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "super@vms.local",
      "password": "super123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.environment.set("platformToken", pm.response.json().data?.access_token ?? "");
